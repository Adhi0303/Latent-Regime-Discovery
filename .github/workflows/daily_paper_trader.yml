name: Daily Paper Trader

on:
  schedule:
    - cron: '30 21 * * 1-5' # Runs at 21:30 UTC every Monday through Friday
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Needed to commit and push changes back to the repo

jobs:
  run-daily-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Paper Trader
        run: python src/bot/paper_trader.py

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trading_bot.db
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily ledger update [skip ci]" && git push)
