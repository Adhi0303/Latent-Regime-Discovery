name: Weekly Continuous Learning

on:
  schedule:
    - cron: '0 22 * * 5' # Runs at 22:00 UTC every Friday (every 5 trading days)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-retraining:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Continuous Learning
        run: python src/bot/continuous_learning.py

      - name: Commit and Push Updated Models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated model retraining (weights update) [skip ci]" && git push)
